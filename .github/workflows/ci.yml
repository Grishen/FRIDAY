name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    env:
      FRIDAY_PYTEST: "1"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/friday_ci
      SYNC_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/friday_ci
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      OTEL_ENABLED: "false"
    services:
      postgres:
        image: pgvector/pgvector:pg15
        ports: ["5432:5432"]
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: friday_ci
        options: >-
          --health-cmd pg_isready
          --health-interval 3s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python deps
        run: pip install -r requirements-python.txt pytest-asyncio pytest-cov "coverage[toml]"
      - name: Migrate
        run: |
          cd services/api
          export PYTHONPATH=src
          alembic upgrade head
      - name: API tests + coverage
        run: bash scripts/run-api-tests.sh

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Lint + test + build
        run: |
          cd apps/web
          npm ci
          npm run lint
          npm run test -- --coverage
          npm run build
