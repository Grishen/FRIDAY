# Invoked when you run `alembic` from the **repository root**.
# Prefer: `./scripts/db-migrate.sh` (copies .env into services/api/.env).
# Paths are resolved relative to this file unless noted otherwise.

[alembic]
script_location = services/api/alembic
prepend_sys_path = services/api

sqlalchemy.url = driver://user:pass@localhost/dbname

version_path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
