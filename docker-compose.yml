services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: friday
    ports:
      - "5433:5432"
    volumes:
      - friday_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.1
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./infra/docker/otel-collector-local.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"

volumes:
  friday_pgdata:
