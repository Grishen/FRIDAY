# Local OpenTelemetry Collector (contrib) — receives OTLP traces and logs them via the debug exporter.
# Used by root `docker-compose.yml` Phase 13. Production should replace the debug exporter with your backend.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s

exporters:
  debug:
    verbosity: detailed

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
